<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>RootFacts - Fakta Unik Sayuran AI</title>

    <meta name="description" content="Kenali berbagai jenis sayuran melalui kamera dan temukan fakta menarik secara instan dengan bantuan AI lokal di browser." />
    <meta name="theme-color" content="#10b981" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="RootFacts" />

    <link rel="icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />

    <!-- TF.js sesuai hint Dicoding. Dimuat lewat CDN agar tidak membuat bundle utama blank. -->
    <script defer src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgpu@4.22.0/dist/tf-backend-webgpu.min.js"></script>
    <script defer src="https://unpkg.com/lucide@0.462.0/dist/umd/lucide.js"></script>

    <style>
      body { font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif; }
      .boot-fallback { padding: 1.25rem; color: #6b7280; }
    </style>
  </head>
  <body>
    <div class="app-container">
      <header class="header">
        <div class="header-content">
          <div class="logo">
            <i data-lucide="sprout" width="24" height="24"></i>
            <span>RootFacts</span>
          </div>
          <div id="header-status" class="status-pill">
            <span id="status-dot" class="status-dot"></span>
            <span id="status-text">Memuat...</span>
          </div>
        </div>
      </header>

      <main id="main-content"><div class="boot-fallback">Menyiapkan aplikasi...</div></main>
    </div>
  </body>
</html>
